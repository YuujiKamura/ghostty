pre-commit:
  parallel: true
  commands:
    zig-fmt:
      glob: "*.zig"
      run: zig fmt --check {staged_files}
    vtable-manifest:
      run: bash -c "./build-winui3.sh 2>&1 | grep -q 'VTABLE MANIFEST OK'"
      skip:
        - merge
        - rebase
    cp-session-smoke:
      # In-vivo assertion: ghostty.exe boot writes a .session file that
      # deckpilot's file scan can read. Only fires when staged files touch
      # the orchestration glue (apprt/winui3, zig-control-plane vendor,
      # build.zig*, or xaml/), since the smoke launches a real ghostty.exe
      # and pays ~3s.
      #
      # Bypass with SKIP_UIA_SMOKE=1 (env) or LEFTHOOK_EXCLUDE=cp-session-smoke.
      run: bash tools/precommit-cp-session-smoke.sh
      fail_text: "CP session-file smoke failed. Run 'pwsh -NoProfile -File tests/winui3/test-cp-session-file-appears.ps1' to reproduce. Bypass: SKIP_UIA_SMOKE=1."
      skip:
        - merge
        - rebase

pre-push:
  commands:
    zig-fmt-check:
      # Catches fmt drift before it reaches main (issue #229).
      # Mirrors the CI check in .github/workflows/ci.yml so direct
      # pushes to main can't bypass the gate that PRs go through.
      run: bash -c "find src -name '*.zig' | head -500 | xargs zig fmt --check"
      fail_text: "zig fmt violations detected. Run 'find src -name \"*.zig\" | xargs zig fmt' to fix."
    build-check:
      run: ./build-winui3.sh
    deadlock-lint:
      # Refuses unbounded waits in UI-thread reachable code.
      # See notes/2026-04-26_deadlock_lint_rules.md.
      run: bash tools/lint-deadlock.sh --quiet
    uia-smoke:
      # Auto-runs the WinUI3 UIA smoke suite before push.
      # Catches drag-bar / focus / surface regressions that compile fine
      # but break user-facing behavior. See issue #236.
      # Skip with LEFTHOOK_EXCLUDE=uia-smoke if you've already run it.
      run: pwsh -NoProfile -File tests/winui3/run-all-tests.ps1 -SkipBuild
      fail_text: "UIA smoke failed. Run 'pwsh -NoProfile -File tests/winui3/run-all-tests.ps1 -SkipBuild' to reproduce."
    fork-isolation:
      # Refuses upstream-shared edits without UPSTREAM-SHARED-OK justification.
      # See AGENTS.md Operating Rule #7 + docs/apprt-contract.md for the rule;
      # see notes/2026-04-27_fork_isolation_audit.md for the existing-violation
      # backlog (those are grandfathered; the lint only flags NEW divergence
      # since fork/main).
      # Bypass with LEFTHOOK_EXCLUDE=fork-isolation only when intentionally
      # landing an audit doc or a meta-change that legitimately spans the tree.
      run: bash tools/lint-fork-isolation.sh --quiet
      fail_text: "apprt contract violation. See docs/apprt-contract.md or run 'bash tools/lint-fork-isolation.sh' for details."
