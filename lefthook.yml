pre-commit:
  parallel: true
  commands:
    zig-fmt:
      glob: "*.zig"
      run: zig fmt --check {staged_files}
    vtable-manifest:
      run: bash -c "./build-winui3.sh 2>&1 | grep -q 'VTABLE MANIFEST OK'"
      skip:
        - merge
        - rebase

pre-push:
  commands:
    zig-fmt-check:
      # Catches fmt drift before it reaches main (issue #229).
      # Mirrors the CI check in .github/workflows/ci.yml so direct
      # pushes to main can't bypass the gate that PRs go through.
      run: bash -c "find src -name '*.zig' | head -500 | xargs zig fmt --check"
      fail_text: "zig fmt violations detected. Run 'find src -name \"*.zig\" | xargs zig fmt' to fix."
    build-check:
      run: ./build-winui3.sh
    deadlock-lint:
      # Refuses unbounded waits in UI-thread reachable code.
      # See notes/2026-04-26_deadlock_lint_rules.md.
      run: bash tools/lint-deadlock.sh --quiet
