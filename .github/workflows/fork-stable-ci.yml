name: Fork Stable CI (Windows-Only)

on:
  push:
    branches: [ main, winui3-apprt ]
  pull_request:
    branches: [ main, winui3-apprt ]
  workflow_dispatch: {}

jobs:
  # --- Windows Build (WinUI3 Focus) ---
  build-windows:
    name: Windows (WinUI3)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~\AppData\Local\zig
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # - name: Verify Manifest
      #   shell: pwsh
      #   run: python xaml/prebuilt/manage_manifest.py --verify

      - name: Zig Build (Prebuilt Mode)
        shell: pwsh
        run: |
          $env:GHOSTTY_WINUI3_PREBUILT_ONLY = "1"
          bash ./build-winui3.sh --release=fast -Dcpu=baseline

      - name: List Artifacts
        shell: pwsh
        run: |
          ls zig-out-winui3/bin | Select-Object Name, Length

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-windows-winui3
          path: |
            zig-out-winui3/bin/
            zig-out-winui3/share/
