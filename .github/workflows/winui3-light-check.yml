name: WinUI3 Light Check

on:
  push:
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - ".github/workflows/winui3-light-check.yml"
  pull_request:
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - ".github/workflows/winui3-light-check.yml"
  workflow_dispatch: {}

jobs:
  winui3-light:
    runs-on: windows-latest
    steps:
      - name: Checkout ghostty-win
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone win-zig repos as siblings
        shell: pwsh
        run: |
          $workspaceParent = Split-Path -Parent $env:GITHUB_WORKSPACE
          git clone --depth 1 https://github.com/YuujiKamura/win-zig-metadata.git (Join-Path $workspaceParent "win-zig-metadata")
          git clone --depth 1 https://github.com/YuujiKamura/win-zig-bindgen.git (Join-Path $workspaceParent "win-zig-bindgen")

      - name: Install WindowsAppSDK winmd into user NuGet cache
        shell: pwsh
        run: |
          $pkg = "microsoft.windowsappsdk"
          $indexUrl = "https://api.nuget.org/v3-flatcontainer/$pkg/index.json"
          $index = Invoke-RestMethod -Uri $indexUrl
          $version = $index.versions[-1]
          $pkgRoot = Join-Path $env:USERPROFILE ".nuget\packages\$pkg\$version"
          $winmd = Join-Path $pkgRoot "lib\uap10.0\Microsoft.UI.Xaml.winmd"
          if (-not (Test-Path -LiteralPath $winmd)) {
            New-Item -ItemType Directory -Path $pkgRoot -Force | Out-Null
            $nupkg = Join-Path $env:RUNNER_TEMP "$pkg.$version.nupkg"
            Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/$pkg/$version/$pkg.$version.nupkg" -OutFile $nupkg
            Expand-Archive -Path $nupkg -DestinationPath $pkgRoot -Force
          }
          if (-not (Test-Path -LiteralPath $winmd)) {
            throw "Microsoft.UI.Xaml.winmd not found: $winmd"
          }
          Write-Host "Using WindowsAppSDK version: $version"

      - name: Delegate IID check
        shell: pwsh
        run: ./scripts/winui3-delegate-iid-check.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Inspect-event-params smoke
        shell: pwsh
        run: ./scripts/winui3-inspect-event-params.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: COM runtime ABI tests
        shell: pwsh
        run: zig test ./src/apprt/winui3/com_runtime.zig

      - name: WinUI3 runtime contract (strict)
        shell: pwsh
        run: ./scripts/test-winui3-runtime-contract.ps1 -Strict
