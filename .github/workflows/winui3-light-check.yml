name: WinUI3 Light Check

on:
  push:
    branches: [ main, winui3-apprt ]
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - "xaml/prebuilt/**"
      - ".github/workflows/winui3-light-check.yml"
  pull_request:
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - ".github/workflows/winui3-light-check.yml"
  workflow_dispatch: {}

jobs:
  winui3-light:
    runs-on: windows-latest
    steps:
      - name: Checkout ghostty-win
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Prebuilt Manifest Consistency
        shell: pwsh
        run: |
          python xaml/prebuilt/manage_manifest.py --verify

      - name: Resource binding tests
        shell: pwsh
        run: zig test ./src/apprt/winui3/resource_binding_test.zig

      - name: WinUI3 runtime contract (strict)
        shell: pwsh
        run: |
          $env:GHOSTTY_WINUI3_PREBUILT_ONLY = "1"
          ./scripts/test-winui3-runtime-contract.ps1 -Strict

      - name: Light Build Check (Prebuilt Mode)
        shell: pwsh
        run: |
          $env:GHOSTTY_WINUI3_PREBUILT_ONLY = "1"
          bash ./build-winui3.sh --release=fast -Dcpu=baseline
