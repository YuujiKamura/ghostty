name: WinUI3 Light Check

on:
  push:
    branches: [ main, winui3-apprt ]
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - "xaml/prebuilt/**"
      - ".github/workflows/winui3-light-check.yml"
  pull_request:
    paths:
      - "scripts/winui3-*.ps1"
      - "src/apprt/winui3/**"
      - ".github/workflows/winui3-light-check.yml"
  workflow_dispatch: {}

jobs:
  winui3-light:
    runs-on: windows-latest
    steps:
      - name: Checkout ghostty-win
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Windows App SDK (NuGet)
        shell: pwsh
        run: |
          nuget install Microsoft.WindowsAppSDK -Version 1.6.250108002 -OutputDirectory _nuget
          $src = "_nuget/Microsoft.WindowsAppSDK.1.6.250108002"
          $dest = Join-Path $env:USERPROFILE ".nuget/packages/microsoft.windowsappsdk/1.6.250108002"
          if (-not (Test-Path $dest)) {
            New-Item -ItemType Directory -Path $dest -Force | Out-Null
            Copy-Item -Recurse -Force "$src/*" $dest
          }
          Write-Host "WindowsAppSDK installed to $dest"

      - name: Verify Prebuilt Manifest Consistency
        shell: pwsh
        run: |
          python xaml/prebuilt/manage_manifest.py --verify

      - name: WinUI3 runtime contract (strict)
        shell: pwsh
        run: |
          $env:GHOSTTY_WINUI3_PREBUILT_ONLY = "1"
          ./scripts/test-winui3-runtime-contract.ps1 -Strict

      - name: Light Build Check (Prebuilt Mode)
        shell: pwsh
        run: |
          $env:GHOSTTY_WINUI3_PREBUILT_ONLY = "1"
          bash ./build-winui3.sh --release=fast -Dcpu=baseline
