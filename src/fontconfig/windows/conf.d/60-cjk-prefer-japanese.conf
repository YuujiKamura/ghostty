<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>
    CJK font fallback preferences for Windows (Issue #140).
    Ensures Japanese glyph variants are preferred for CJK unified ideographs
    (e.g. "送" U+9001 uses JP form, not CN/KR).
  </description>

  <!-- Set default lang to ja so fontconfig prefers JP glyph variants -->
  <match target="pattern">
    <test qual="all" name="lang" compare="eq">
      <string></string>
    </test>
    <edit name="lang" mode="append">
      <string>ja</string>
    </edit>
  </match>

  <!-- Monospace fallback: append Japanese monospace fonts -->
  <match target="pattern">
    <test name="family" qual="any"><string>monospace</string></test>
    <edit name="family" mode="append">
      <string>BIZ UDGothic</string>
      <string>Yu Gothic</string>
      <string>MS Gothic</string>
    </edit>
  </match>

  <!-- Sans-serif fallback: append Japanese fonts -->
  <match target="pattern">
    <test name="family" qual="any"><string>sans-serif</string></test>
    <edit name="family" mode="append">
      <string>Yu Gothic UI</string>
      <string>BIZ UDGothic</string>
      <string>Meiryo</string>
    </edit>
  </match>

  <!-- Generic CJK fallback: prefer Japanese fonts for any request -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Yu Gothic UI</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>BIZ UDGothic</family>
    </prefer>
  </alias>
</fontconfig>
