<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>Bundled Ghostty fontconfig defaults for Windows</description>

  <!-- Prefer Japanese CJK variants when no stronger lang hint is present. -->
  <match target="pattern">
    <test qual="all" name="lang" compare="not_eq">
      <string>ja</string>
    </test>
    <edit name="lang" mode="prepend" binding="strong">
      <string>ja</string>
    </edit>
  </match>

  <dir>C:/Windows/Fonts</dir>
  <include ignore_missing="yes">conf.d</include>
</fontconfig>
